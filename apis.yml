aid: bloomberg-media-platforms
name: Bloomberg Media Platforms
description: Bloomberg Media Platforms encompass Bloomberg's digital news and content
  distribution channels including Bloomberg.com, Bloomberg Businessweek, Bloomberg
  Markets, Bloomberg Technology, Bloomberg Opinion, and Bloomberg Quicktake. Bloomberg
  provides news APIs for distributing financial news, market data updates, and editorial
  content to institutional clients and media partners.
